<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU War on Drugs - Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-header">
                <h1>EU War on Drugs</h1>
                <p class="subtitle">Live Drug Enforcement Event Map</p>
            </div>

            <div id="filters">
                <h3>Filter by Drug Type</h3>
                <div id="drug-filters" class="filter-group"></div>

                <h3>Filter by Category</h3>
                <div id="category-filters" class="filter-group"></div>
            </div>

            <div id="stats-bar">
                <div class="stat">
                    <span id="stat-total" class="stat-number">0</span>
                    <span class="stat-label">Events</span>
                </div>
                <div class="stat">
                    <span id="stat-countries" class="stat-number">0</span>
                    <span class="stat-label">Countries</span>
                </div>
                <div class="stat">
                    <span id="stat-seizures" class="stat-number">0</span>
                    <span class="stat-label">Seizures (kg)</span>
                </div>
            </div>

            <div id="timeline">
                <h3>Recent Events</h3>
                <div id="event-list"></div>
            </div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
            <div id="legend">
                <h4>Drug Types</h4>
                <div id="legend-items"></div>
                <h4>Categories</h4>
                <div id="legend-categories"></div>
            </div>
        </main>
    </div>

    <div id="event-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/markers.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
